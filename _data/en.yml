play:
  title: "Play together"
  intro: >
    Counter-Strike 1.6 is <em>peer-hostable</em>: someone runs a
    <span class="term" tabindex="0" role="button">server<span class="teapot" aria-hidden="true">🫖</span><span class="tip">A server is just the program that hosts the match. Everyone else “connects” to it. It can be a rented machine — or your own PC.</span></span>,
    everyone else connects to it. Below are three ways to do that, from zero-effort to full control.
  console_title: "First: how to connect to any server"
  console_steps:
    - >
      In the game, open the console with the <kbd>~</kbd> key (the tilde, top-left under <kbd>Esc</kbd>).
    - >
      Type <code>connect &lt;address&gt;</code> and press Enter — for example
      <code>connect 192.168.5.10:27015</code>. That's the server's
      <span class="term" tabindex="0" role="button">IP address<span class="teapot" aria-hidden="true">🫖</span><span class="tip">An IP address is a device's number on a network, like a phone number. Servers are reached at IP + port, e.g. 192.168.5.10:27015.</span></span>
      and <span class="term" tabindex="0" role="button">port<span class="teapot" aria-hidden="true">🫖</span><span class="tip">A port is a numbered “door” on a machine. CS 1.6 servers use 27015 by default. You usually only type it if it's different.</span></span>.
    - "That's the whole trick. Every method below just changes <em>which address</em> you type."

  options:
    - id: rent
      badge: "Easiest"
      title: "1 · Rent a ready server"
      lead: "Zero setup, always online, someone else keeps it running. Best if you want a permanent home for your crew."
      steps:
        - >
          Pick any game-server host. There are plenty — names to search for:
          <strong>ZAP-Hosting</strong>, <strong>Nitrado</strong>, <strong>GameServers</strong>,
          <strong>Fragnet</strong>, <strong>Host Havoc</strong>, <strong>Fatality Servers</strong>.
          (We don't link any — pick whichever is cheap and close to you.)
        - >
          Order a <strong>Counter-Strike 1.6</strong> /
          <span class="term" tabindex="0" role="button">HLDS<span class="teapot" aria-hidden="true">🫖</span><span class="tip">HLDS = Half-Life Dedicated Server, the official program that hosts 1.6 matches. Hosts label the product “CS 1.6” or “HLDS”.</span></span>
          slot. Choose a location with low
          <span class="term" tabindex="0" role="button">ping<span class="teapot" aria-hidden="true">🫖</span><span class="tip">Ping (latency) is the round-trip time to the server in milliseconds. Lower is smoother. Pick a location near most of your friends.</span></span>
          for most of your friends.
        - "The host hands you an <code>IP:port</code>. Share it. Everyone runs <code>connect IP:port</code>. Done."
    - id: vlan
      badge: "Recommended for friends"
      title: "2 · Your PC + a virtual LAN"
      lead: >
        The friendliest way to host from home. A
        <span class="term" tabindex="0" role="button">virtual LAN<span class="teapot" aria-hidden="true">🫖</span><span class="tip">A virtual LAN (VPN mesh) tricks a group of computers into thinking they're on the same home network, even across the internet. No router settings, no exposed ports.</span></span>
        makes everyone feel like they're on the same home network — no router settings, nothing exposed to the internet.
      steps:
        - >
          Everyone installs the <em>same</em> tool. Popular ones:
          <strong>ZeroTier</strong>, <strong>Tailscale</strong>, <strong>Radmin VPN</strong>, <strong>Hamachi</strong>.
        - "One person creates a network and shares the join code/ID. Everyone joins it."
        - >
          Each person now gets a private
          <span class="term" tabindex="0" role="button">virtual IP<span class="teapot" aria-hidden="true">🫖</span><span class="tip">The address the VPN tool assigns you inside the group — often like 10.147.x.x or 100.x.x.x. Others use it to reach your machine.</span></span>
          (shown in the tool). Any member can host.
        - >
          The host starts a game with <em>Create Server</em> (or runs a
          <span class="term" tabindex="0" role="button">dedicated server<span class="teapot" aria-hidden="true">🫖</span><span class="tip">A dedicated server runs the match without anyone playing on that machine — steadier for 4+ players. The bundled build can also just “Create Server” from the menu for small games.</span></span>).
          Everyone else types <code>connect &lt;host's virtual IP&gt;:27015</code>.
        - "Feels exactly like a LAN party. Any friend can be the host next time."
faq:
  title: "FAQ"
  items:
    - q: "Do my friends need Steam?"
      a: >
        No. These builds run the classic non-Steam 1.6, so anyone can join with just the download —
        no accounts, no store.
    - q: "Windows warns about an unknown publisher. Safe?"
      a: >
        That's the standard warning for any app not signed with a paid certificate. Choose
        <em>More info → Run anyway</em>. On macOS it's the same idea — right-click → Open once.

